### configure Tmux Plugin Manager
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.local/share/tmux/plugins/'

if 'test ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "${TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_PLUGIN_MANAGER_PATH}/tpm"'
  run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}

set -g prefix C-a

# bind 'C-a C-a' to type 'C-a'  
bind C-a send-prefix
# C-b is intentionally unbound so it passes through to programs in the pane
unbind C-b

# vi-style keybindings in tmux command/status and copy mode
set -g status-keys vi
setw -g mode-keys vi

# Vim-style pane/window navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H previous-window
bind -r L next-window

# Copy mode vim motions and selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# history within tmux
set-option -g history-limit 50000

# kill the laggy <Esc> feel for programs in tmux panes
set -sg escape-time 10

# refresh SSH/TTY env vars on detach/reattach so OSC52 + agent forwarding stay correct
set -g update-environment "SSH_TTY SSH_CONNECTION SSH_CLIENT SSH_AUTH_SOCK DISPLAY"

# Enable mouse support for scrolling and selection
set -g mouse on

# OSC52 clipboard support (tmux 3.3a+)
set -g allow-passthrough on
set -s set-clipboard on
set -as terminal-features ',xterm-256color:clipboard'
set -as terminal-features ',xterm-ghostty:clipboard'

# Extended keys support (CSI u protocol) for C-; C-. etc.
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# tmux-256color is what programs *inside* tmux see; outer TERM (xterm-256color
# from nvim:term, or xterm-ghostty when run directly) is matched by the overrides below
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color*:RGB'
set -ag terminal-overrides ',xterm-ghostty:RGB'

set -g @plugin 'tmux-plugins/tpm'
#
# basic plugins
set -g @plugin 'tmux-plugins/tmux-yank'
#
# theme / style
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'alexwforsythe/tmux-which-key'  # prefix + space
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'dreknix/tmux-primary-ip'
#
# tooling
set -g @plugin 'omerxx/tmux-sessionx'          # prefix + o

### configure plugins

### Gruvbox Material theme colors (matches Neovim gruvbox-material)
# Gruvbox Material "mix" foreground, "medium" background palette
set -g @gruvbox_bg "#282828"
set -g @gruvbox_bg0 "#32302f"
set -g @gruvbox_bg1 "#3c3836"
set -g @gruvbox_bg2 "#504945"
set -g @gruvbox_fg "#ebdbb2"
set -g @gruvbox_fg4 "#928374"
set -g @gruvbox_red "#ea6962"
set -g @gruvbox_green "#a9b665"
set -g @gruvbox_yellow "#d8a657"
set -g @gruvbox_blue "#7daea3"
set -g @gruvbox_purple "#d3869b"
set -g @gruvbox_aqua "#89b482"
set -g @gruvbox_orange "#e78a4e"

# Status bar colors
set -g status-style "bg=#{@gruvbox_bg},fg=#{@gruvbox_fg}"
set -g window-status-style "bg=#{@gruvbox_bg1},fg=#{@gruvbox_fg4}"
set -g window-status-current-style "bg=#{@gruvbox_yellow},fg=#{@gruvbox_bg},bold"
set -g window-status-separator " "

# Pane border colors
set -g pane-border-style "fg=#{@gruvbox_bg2}"
set -g pane-active-border-style "fg=#{@gruvbox_yellow}"

# Message colors
set -g message-style "bg=#{@gruvbox_yellow},fg=#{@gruvbox_bg}"
set -g message-command-style "bg=#{@gruvbox_bg2},fg=#{@gruvbox_fg}"

# Mode colors (copy mode highlighting)
set -g mode-style "bg=#{@gruvbox_bg2},fg=#{@gruvbox_fg}"

# set left and right status bar
set -g allow-rename off
set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100

# Status bar format with GruvboxDark styling
set -g status-left "#[bg=#{@gruvbox_green},fg=#{@gruvbox_bg},bold] #S #[bg=#{@gruvbox_bg},fg=#{@gruvbox_green}] "
set -g status-right "#[bg=#{@gruvbox_bg},fg=#{@gruvbox_blue}]#[bg=#{@gruvbox_blue},fg=#{@gruvbox_bg}] %d.%m #[bg=#{@gruvbox_bg},fg=#{@gruvbox_yellow}]#[bg=#{@gruvbox_yellow},fg=#{@gruvbox_bg}] %H:%M "

# Window status format
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

### general config

# renumber when window is closed
set -g renumber-window on

# initialize tmux plugin manager and source all plugins

# Sidekick: show session name as the first line of every sidekick pane.
# Sidekick disables the per-session status bar, so we use pane-border instead.
# Matches both default (`claude <hash>`) and named (`claude-foo <hash>`) sessions.
set-hook -g session-created 'run-shell "echo \"#S\" | grep -qE \"^(claude|opencode|codex)( |-)\" && tmux set -t \"#S\" pane-border-status top && tmux set -t \"#S\" pane-border-format \" #S \""'

# Apply to sessions that already exist when this config is sourced.
run-shell 'tmux list-sessions -F "##S" | grep -E "^(claude|opencode|codex)( |-)" | while IFS= read -r s; do tmux set -t "$s" pane-border-status top; tmux set -t "$s" pane-border-format " ##S "; done'

run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'
